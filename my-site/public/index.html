<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio of Atharva Ghayal — AI-focused software developer building fast, responsive web experiences for maximum visibility." />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/gif" href="%PUBLIC_URL%/favicon.gif" />
    <link rel="shortcut icon" type="image/gif" href="%PUBLIC_URL%/favicon.gif" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <title>Atharva Ghayal | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var gifPath = '%PUBLIC_URL%/favicon.gif';
        var icon = document.querySelector('link[rel="icon"]') || document.querySelector('link[rel="shortcut icon"]');
        if (!icon) {
          icon = document.createElement('link');
          icon.rel = 'icon';
          document.head.appendChild(icon);
        }
        icon.type = 'image/gif';
        function refreshFavicon() {
          icon.href = gifPath + '?v=' + Date.now();
        }
        refreshFavicon();
        setInterval(refreshFavicon, 1000);
      })();
    </script>
  </body>
</html>
