<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="#home">Home</a>
            <a href="#projects">Projects</a>
            <a href="blogs.html">Blogs</a>

        </nav>
        <button class="theme-toggle" onclick="toggleTheme()">
            <img id="theme-icon" src="sun.png" alt="Toggle Theme">

    <section id="projects">
